# Identity — must match the project created in SonarQube (Server or Cloud)
sonar.projectKey=sama-foreign-investment
sonar.projectName=SAMA Foreign Investment
sonar.projectVersion=1.0

# Source roots (Python + React)
sonar.sources=src,frontend/src

sonar.python.version=3.11
sonar.javascript.file.suffixes=.js,.jsx

sonar.test.inclusions=frontend/src/App.test.js,frontend/src/setupTests.js

sonar.exclusions=\
  **/node_modules/**,\
  **/venv/**,\
  **/.venv/**,\
  **/output/**,\
  **/data/**,\
  **/.claude/**,\
  **/build/**,\
  **/coverage/**,\
  **/public/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/*.xlsx,\
  **/*.png,\
  **/*.jpg,\
  **/*.jpeg,\
  **/*.svg,\
  **/*.csv,\
  **/*.webp

sonar.sourceEncoding=UTF-8
